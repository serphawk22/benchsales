<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Bench Sales – Sent Records</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="data.css" />
  </head>
  <body>
    <div class="app-container">
      <header class="app-header">
        <div class="header-top">
          <h1>Submission Records History</h1>
          <div class="header-actions">
            <a href="index.html" class="nav-button">Main Dashboard</a>
            <button id="clearLogBtn" class="clear-button">Clear Records</button>
            <button id="logoutBtn" class="logout-button">Logout</button>
          </div>
        </div>
        <p class="subtitle">
          Showing submission records captured in the last 3 days. Older records are automatically cleaned up.
        </p>
      </header>

      <main class="main-content">
        <div class="card">
          <div class="table-container">
            <table class="records-table">
              <thead>
                <tr>
                  <th>Date &amp; Time</th>
                  <th>Resume File</th>
                  <th>Outcome Status</th>
                  <th class="text-right">Actions</th>
                </tr>
              </thead>
              <tbody id="recordsBody">
                <!-- Records dynamically populated here -->
              </tbody>
            </table>
          </div>
          <div id="emptyState" class="empty-state-container" style="display: none;">
            <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" class="empty-icon">
              <circle cx="12" cy="12" r="10"></circle>
              <line x1="12" y1="8" x2="12" y2="12"></line>
              <line x1="12" y1="16" x2="12.01" y2="16"></line>
            </svg>
            <p>No submission records found in the last 3 days.</p>
          </div>
        </div>
      </main>
    </div>

    <!-- Job Description Modal -->
    <div id="jdModal" class="modal-overlay" style="display: none;">
      <div class="modal-card">
        <div class="modal-header">
          <h3>Job Description Detail</h3>
          <button id="closeModalBtn" class="close-modal-btn" aria-label="Close modal">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <line x1="18" y1="6" x2="6" y2="18"></line>
              <line x1="6" y1="6" x2="18" y2="18"></line>
            </svg>
          </button>
        </div>
        <div class="modal-body">
          <pre id="modalJdText" class="jd-pre"></pre>
        </div>
        <div class="modal-footer">
          <button id="copyJdBtn" class="primary-button">Copy text</button>
          <button id="closeModalBtnSecondary" class="secondary-button">Close</button>
        </div>
      </div>
    </div>

    <script src="data.js"></script>
  </body>
</html>
